services:
  - type: web
    name: url-shortener
    runtime: docker
    plan: free
    branch: main
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: url-shortener-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: BASE_URL
        value: https://url-shortener.onrender.com
      - key: CODE_LENGTH
        value: "6"

databases:
  - name: url-shortener-db
    plan: free